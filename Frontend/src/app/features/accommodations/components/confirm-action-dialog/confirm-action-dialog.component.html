@if (open()) {
  <div class="cad" aria-hidden="false">
    <div class="cad__backdrop" role="presentation" tabindex="-1" (click)="onBackdropClick()"></div>
    <div
      #panel
      class="cad__panel"
      role="dialog"
      aria-modal="true"
      aria-labelledby="cad-title"
      (click)="$event.stopPropagation()"
    >
      <h2 id="cad-title" class="cad__title">{{ title() }}</h2>
      @if (description()) {
        <p class="cad__description">{{ description() }}</p>
      }
      <div class="cad__actions">
        <button
          type="button"
          class="cad__btn cad__btn--ghost"
          data-confirm-initial-focus
          [disabled]="busy()"
          (click)="onCancel()"
        >
          {{ cancelLabel() }}
        </button>
        <button type="button" class="cad__btn cad__btn--danger" [disabled]="busy()" (click)="onConfirm()">
          {{ busy() ? 'Removing…' : confirmLabel() }}
        </button>
      </div>
    </div>
  </div>
}
