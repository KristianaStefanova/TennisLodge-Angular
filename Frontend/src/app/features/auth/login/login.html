<section class="login" aria-labelledby="login-title">
  <div class="container login__inner">
    <div class="login__card">
      <header class="login__header">
        <p class="login__kicker">Tennis Lodge</p>
        <h1 #loginTitle id="login-title" class="login__title">Welcome back</h1>
        <p class="login__lead">Sign in with your email to continue planning matches and trips.</p>
      </header>

      @if (error()) {
        <div
          #loginAlert
          class="login__alert"
          role="alert"
          tabindex="-1"
          aria-live="polite"
        >
          {{ error() }}
        </div>
      }

      <form class="login__form" [formGroup]="loginForm" (ngSubmit)="submit()" novalidate>
        <div class="login__grid">
          <label
            class="login__field"
            [class.login__field--invalid]="
              loginForm.get('email')?.touched && loginForm.get('email')?.invalid
            "
            for="login-input-email"
          >
            <span class="login__label">Email</span>
            <input
              id="login-input-email"
              class="login__control"
              [class.login__control--invalid]="
                loginForm.get('email')?.touched && loginForm.get('email')?.invalid
              "
              appInputError
              type="email"
              formControlName="email"
              autocomplete="email"
              [attr.aria-invalid]="
                loginForm.get('email')?.touched && loginForm.get('email')?.invalid
                  ? 'true'
                  : null
              "
            />
            @if (loginForm.get('email')?.touched && loginForm.get('email')?.invalid) {
              <span class="login__field-error" role="alert">
                @if (loginForm.get('email')?.hasError('required')) {
                  This field is required.
                } @else if (loginForm.get('email')?.hasError(validationKeys.invalidEmail)) {
                  Please enter a valid email address (e.g. name@example.com — include @ and a dot in the domain).
                }
              </span>
            }
            <span class="login__hint">Format: name@example.com (needs @ and a dot in the domain).</span>
          </label>

          <label
            class="login__field"
            [class.login__field--invalid]="
              loginForm.get('password')?.touched && loginForm.get('password')?.invalid
            "
            for="login-input-password"
          >
            <span class="login__label">Password</span>
            <input
              id="login-input-password"
              class="login__control"
              [class.login__control--invalid]="
                loginForm.get('password')?.touched && loginForm.get('password')?.invalid
              "
              appInputError
              type="password"
              formControlName="password"
              autocomplete="current-password"
              [attr.aria-invalid]="
                loginForm.get('password')?.touched && loginForm.get('password')?.invalid
                  ? 'true'
                  : null
              "
            />
            @if (loginForm.get('password')?.touched && loginForm.get('password')?.invalid) {
              <span class="login__field-error" role="alert">
                @if (loginForm.get('password')?.hasError('required')) {
                  This field is required.
                }
              </span>
            }
          </label>
        </div>

        <div class="login__actions">
          <button class="login__btn login__btn--primary" type="submit" [disabled]="submitting()">
            {{ submitting() ? 'Signing in…' : 'Sign in' }}
          </button>
          <a routerLink="/register" class="login__btn login__btn--ghost">Need an account? Create one</a>
        </div>
      </form>
    </div>
  </div>
</section>
