<section class="register" aria-labelledby="register-title">
  <div class="container register__inner">
    <div class="register__card">
      <header class="register__header">
        <p class="register__kicker">Tennis Lodge</p>
        <h1 #registerTitle id="register-title" class="register__title">Create your account</h1>
        <p class="register__lead">
          Join the community to follow tournaments, host events, and plan your trips.
        </p>
      </header>

      @if (error()) {
        <div
          #registerAlert
          class="register__alert"
          role="alert"
          tabindex="-1"
          aria-live="polite"
        >
          {{ error() }}
        </div>
      }

      <form class="register__form" [formGroup]="registerForm" (ngSubmit)="submit()" novalidate>
        <div class="register__grid">
          <label
            class="register__field register__field--full"
            [class.register__field--invalid]="
              registerForm.get('email')?.touched && registerForm.get('email')?.invalid
            "
            for="register-input-email"
          >
            <span class="register__label">Email</span>
            <input
              id="register-input-email"
              class="register__control"
              [class.register__control--invalid]="
                registerForm.get('email')?.touched && registerForm.get('email')?.invalid
              "
              appInputError
              type="email"
              formControlName="email"
              autocomplete="email"
              [attr.aria-invalid]="
                registerForm.get('email')?.touched && registerForm.get('email')?.invalid
                  ? 'true'
                  : null
              "
            />
            @if (registerForm.get('email')?.touched && registerForm.get('email')?.invalid) {
              <span class="register__field-error" role="alert">
                @if (registerForm.get('email')?.hasError('required')) {
                  This field is required.
                } @else if (registerForm.get('email')?.hasError(validationKeys.invalidEmail)) {
                  Please enter a valid email address (e.g. name@example.com — include @ and a dot in the domain).
                }
              </span>
            }
            <span class="register__hint">Format: name@example.com (needs @ and a dot in the domain).</span>
          </label>

          <label
            class="register__field"
            [class.register__field--invalid]="
              registerForm.get('firstName')?.touched && registerForm.get('firstName')?.invalid
            "
            for="register-input-firstName"
          >
            <span class="register__label">First name</span>
            <input
              id="register-input-firstName"
              class="register__control"
              [class.register__control--invalid]="
                registerForm.get('firstName')?.touched && registerForm.get('firstName')?.invalid
              "
              appInputError
              type="text"
              formControlName="firstName"
              autocomplete="given-name"
              [attr.aria-invalid]="
                registerForm.get('firstName')?.touched && registerForm.get('firstName')?.invalid
                  ? 'true'
                  : null
              "
            />
            @if (registerForm.get('firstName')?.touched && registerForm.get('firstName')?.invalid) {
              <span class="register__field-error" role="alert">
                @if (registerForm.get('firstName')?.hasError('required')) {
                  This field is required.
                }
              </span>
            }
          </label>

          <label
            class="register__field"
            [class.register__field--invalid]="
              registerForm.get('lastName')?.touched && registerForm.get('lastName')?.invalid
            "
            for="register-input-lastName"
          >
            <span class="register__label">Last name</span>
            <input
              id="register-input-lastName"
              class="register__control"
              [class.register__control--invalid]="
                registerForm.get('lastName')?.touched && registerForm.get('lastName')?.invalid
              "
              appInputError
              type="text"
              formControlName="lastName"
              autocomplete="family-name"
              [attr.aria-invalid]="
                registerForm.get('lastName')?.touched && registerForm.get('lastName')?.invalid
                  ? 'true'
                  : null
              "
            />
            @if (registerForm.get('lastName')?.touched && registerForm.get('lastName')?.invalid) {
              <span class="register__field-error" role="alert">
                @if (registerForm.get('lastName')?.hasError('required')) {
                  This field is required.
                }
              </span>
            }
          </label>

          <label
            class="register__field"
            [class.register__field--invalid]="
              registerForm.get('username')?.touched && registerForm.get('username')?.invalid
            "
            for="register-input-username"
          >
            <span class="register__label">Username</span>
            <input
              id="register-input-username"
              class="register__control"
              [class.register__control--invalid]="
                registerForm.get('username')?.touched && registerForm.get('username')?.invalid
              "
              appInputError
              type="text"
              formControlName="username"
              autocomplete="username"
              [attr.aria-invalid]="
                registerForm.get('username')?.touched && registerForm.get('username')?.invalid
                  ? 'true'
                  : null
              "
            />
            @if (registerForm.get('username')?.touched && registerForm.get('username')?.invalid) {
              <span class="register__field-error" role="alert">
                @if (registerForm.get('username')?.hasError('required')) {
                  This field is required.
                } @else if (registerForm.get('username')?.hasError(validationKeys.usernameLetters)) {
                  Username must be at least 3 letters (A–Z only, no numbers or spaces).
                }
              </span>
            }
            <span class="register__hint">At least 3 letters (A–Z), no numbers or spaces.</span>
          </label>

          <label class="register__field" for="register-input-tel">
            <span class="register__label">Phone <span class="register__optional">(optional)</span></span>
            <input
              id="register-input-tel"
              class="register__control"
              appInputError
              type="tel"
              formControlName="tel"
              autocomplete="tel"
            />
          </label>

          <label
            class="register__field"
            [class.register__field--invalid]="
              (registerForm.get('password')?.touched && registerForm.get('password')?.invalid) ||
              passwordGroupInvalid()
            "
            for="register-input-password"
          >
            <span class="register__label">Password</span>
            <input
              id="register-input-password"
              class="register__control"
              [class.register__control--invalid]="
                (registerForm.get('password')?.touched && registerForm.get('password')?.invalid) ||
                passwordGroupInvalid()
              "
              appInputError
              [appInputErrorGroup]="passwordGroupInvalid()"
              type="password"
              formControlName="password"
              autocomplete="new-password"
              [attr.aria-invalid]="
                (registerForm.get('password')?.touched && registerForm.get('password')?.invalid) ||
                passwordGroupInvalid()
                  ? 'true'
                  : null
              "
            />
            @if (registerForm.get('password')?.touched && registerForm.get('password')?.invalid) {
              <span class="register__field-error" role="alert">
                @if (registerForm.get('password')?.hasError('required')) {
                  This field is required.
                } @else if (
                  registerForm.get('password')?.getError(validationKeys.passwordStrength)?.reason ===
                  passwordStrengthReason.minLength
                ) {
                  Password must be at least 5 characters.
                } @else if (
                  registerForm.get('password')?.getError(validationKeys.passwordStrength)?.reason ===
                  passwordStrengthReason.letterAndNumber
                ) {
                  Password must include at least one letter and one number.
                }
              </span>
            }
            <span class="register__hint">At least 5 characters, with at least one letter and one number.</span>
          </label>

          <label
            class="register__field"
            [class.register__field--invalid]="
              (registerForm.get('repeatPassword')?.touched &&
                registerForm.get('repeatPassword')?.invalid) ||
              passwordGroupInvalid()
            "
            for="register-input-repeatPassword"
          >
            <span class="register__label">Confirm password</span>
            <input
              id="register-input-repeatPassword"
              class="register__control"
              [class.register__control--invalid]="
                (registerForm.get('repeatPassword')?.touched &&
                  registerForm.get('repeatPassword')?.invalid) ||
                passwordGroupInvalid()
              "
              appInputError
              [appInputErrorGroup]="passwordGroupInvalid()"
              type="password"
              formControlName="repeatPassword"
              autocomplete="new-password"
              [attr.aria-invalid]="
                (registerForm.get('repeatPassword')?.touched &&
                  registerForm.get('repeatPassword')?.invalid) ||
                passwordGroupInvalid()
                  ? 'true'
                  : null
              "
            />
            @if (registerForm.get('repeatPassword')?.touched) {
              @if (registerForm.get('repeatPassword')?.hasError('required')) {
                <span class="register__field-error" role="alert">This field is required.</span>
              } @else if (passwordGroupInvalid()) {
                <span class="register__field-error" role="alert">
                  Passwords do not match. Check both fields.
                </span>
              }
            }
          </label>
        </div>

        <div class="register__actions">
          <button class="register__btn register__btn--primary" type="submit" [disabled]="submitting()">
            {{ submitting() ? 'Creating account…' : 'Create account' }}
          </button>
          <a routerLink="/login" class="register__btn register__btn--ghost">Already have an account? Log in</a>
        </div>
      </form>
    </div>
  </div>
</section>
